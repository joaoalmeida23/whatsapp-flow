<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Renata Almeida Fotografia</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="chat-container">

    <div class="chat-topo">

        <div class="perfil">

            <div class="foto">
                📸
            </div>

            <div>
                <h2>Renata Almeida Fotografia</h2>
                <p>Atendimento automático</p>
            </div>

        </div>

    </div>

    <div class="chat-mensagens"
         id="chat">

        <div class="mensagem bot">
            Olá 👋 <br><br>

            Seja bem-vindo à Renata Almeida Fotografia 😊
        </div>

        <div class="mensagem bot">
            Escolha uma opção abaixo:
        </div>

        <div class="opcoes">

            <button onclick="responder('orcamento')">
                📸 Solicitar orçamento
            </button>

            <button onclick="responder('portfolio')">
                📷 Ver portfólio
            </button>

            <button onclick="responder('whatsapp')">
                💬 Falar no WhatsApp
            </button>

        </div>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
